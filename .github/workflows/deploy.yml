name: Deploy to film-test

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: film-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync code to server (keep .env)
        shell: bash
        run: |
          set -euo pipefail
          rsync -a --delete \
            --no-owner --no-group \
            --exclude '.env' \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            ./ /srv/sandbox/app/


      - name: Ensure db is up
        shell: bash
        run: |
          set -euo pipefail
          cd /srv/sandbox/app
          docker compose -p film --env-file .env up -d db
          docker compose -p film --env-file .env ps

      - name: Deploy app only (do not restart db)
        shell: bash
        env:
          COMPOSE_BAKE: "false"
        run: |
          set -euo pipefail
          cd /srv/sandbox/app
          docker compose -p film --env-file .env up -d --build --no-deps app
          docker compose -p film --env-file .env ps
          curl -fsS http://127.0.0.1:5101 >/dev/null
