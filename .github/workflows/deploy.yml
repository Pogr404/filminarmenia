name: Deploy to film-test (main)

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync code to /srv/sandbox/app (keep server .env)
        shell: bash
        run: |
          set -euo pipefail
          rsync -a --delete \
            --exclude '.env' \
            ./ /srv/sandbox/app/

      - name: Ensure Postgres is up
        shell: bash
        run: |
          set -euo pipefail
          cd /srv/sandbox/app
          docker compose up -d db
          docker compose ps

      - name: Deploy app only (do not restart db)
        shell: bash
        env:
          COMPOSE_BAKE: "false"
        run: |
          set -euo pipefail
          cd /srv/sandbox/app
          docker compose up -d --build --no-deps app
          docker compose ps
