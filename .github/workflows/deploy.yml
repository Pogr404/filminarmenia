name: Deploy to film-test

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: film-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync code to /srv/sandbox/app (keep server .env)
        run: |
          rsync -a --delete \
            --exclude '.env' \
            --exclude 'node_modules/' \
            --exclude '.git/' \
            ./ /srv/sandbox/app/

      - name: Ensure Postgres is up (persistent volume)
        working-directory: /srv/sandbox/app
        run: |
          docker compose -p film --env-file .env up -d db
          docker compose -p film ps

      - name: Deploy app only (do not restart db)
        working-directory: /srv/sandbox/app
        run: |
          docker compose -p film --env-file .env up -d --build --no-deps app
          docker compose -p film ps
